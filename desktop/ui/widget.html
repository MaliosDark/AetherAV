<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; box-sizing: border-box; font-family: system-ui, "Segoe UI", sans-serif; user-select: none; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(120% 100% at 50% 0%, #0e2630 0%, #0a141a 70%);
    color: #dbeaf0; overflow: hidden;
    border: 1px solid #16313c; border-radius: 14px;
  }
  .w { padding: 14px 16px; }
  .top { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #8aa1ac; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #34e08a; box-shadow: 0 0 8px #34e08a; }
  .big { font-size: 23px; font-weight: 800; color: #34e08a; margin: 8px 0 2px; letter-spacing: .5px;
         text-shadow: 0 0 18px rgba(52, 224, 138, .45); }
  .sub { font-size: 11px; color: #5f7681; }
  .rows { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; justify-content: space-between; font-size: 12px; color: #8aa1ac; }
  .row b { color: #27d8ee; font-variant-numeric: tabular-nums; }
  .x { position: absolute; top: 7px; right: 11px; color: #5f7681; cursor: pointer; font-size: 14px; line-height: 1; }
  .x:hover { color: #dbeaf0; }
</style>
</head>
<body>
  <div class="w" data-tauri-drag-region>
    <div class="top"><span class="dot"></span> AetherAV</div>
    <div class="big" id="status">PROTECTED</div>
    <div class="sub" id="sub">Real-time protection on</div>
    <div class="rows">
      <div class="row"><span>Signatures</span><b id="sigs">loading...</b></div>
      <div class="row"><span>CPU</span><b id="cpu">--</b></div>
    </div>
  </div>
  <span class="x" id="close">x</span>
<script>
  const T = window.__TAURI__ || {};
  const E = T.event;
  const nf = new Intl.NumberFormat();
  const set = (id, v) => { const n = document.getElementById(id); if (n) n.textContent = v; };

  document.getElementById('close').addEventListener('click', () => {
    if (T.window) T.window.getCurrentWindow().close();
  });

  if (E) {
    E.listen('engine-ready', e => {
      if (e.payload && e.payload.signatures != null) set('sigs', nf.format(e.payload.signatures));
    });
    E.listen('metrics', e => {
      const m = e.payload || {};
      if (m.cpu != null) set('cpu', Math.round(m.cpu) + '%');
    });
    E.listen('alert', e => {
      if (e.payload) {
        set('status', 'ALERT');
        document.getElementById('status').style.color = '#ef5350';
        set('sub', typeof e.payload === 'string' ? e.payload : (e.payload.title || 'Threat detected'));
      }
    });
  }
</script>
</body>
</html>
