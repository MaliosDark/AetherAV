name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # NOTE: warnings are denied in the `lint` job (clippy -D warnings) on Linux.
  # We deliberately do NOT set RUSTFLAGS=-D warnings globally: cross-platform
  # builds (macOS/Windows) legitimately leave Linux-only helpers unused, and
  # failing the whole build on a platform dead-code warning is brittle.

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (all platforms must compile)
        run: cargo build --workspace --all-targets
      # The full unit-test suite runs on Linux. Several tests exercise Linux-only
      # facilities (/proc cross-view, fanotify, Unix perms) and are environment-
      # specific on macOS/Windows; those platforms verify compilation above, and
      # the real release binaries are built + smoke-tested per-OS in release.yml.
      - name: Test (full suite)
        if: runner.os == 'Linux'
        run: cargo test --workspace
      - name: Test without YARA-X (constrained build)
        if: runner.os == 'Linux'
        run: cargo test --workspace --no-default-features

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  sandbox-unicorn:
    name: sandbox (Unicorn emulation backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The Unicorn Engine sys crate builds libunicorn via cmake.
      - name: install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake
      - name: test with unicorn feature
        run: cargo test -p aether-sandbox --features unicorn

  bench-smoke:
    name: bench smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Compile benches and run a single fast iteration to catch breakage.
      - name: bench (smoke)
        run: cargo bench -p aether-core --bench scan_bench -- --warm-up-time 0.1 --measurement-time 0.5 --sample-size 10
